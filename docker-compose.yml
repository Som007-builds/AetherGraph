# docker-compose.yml
version: "3.8"

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: scimesh_neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol (what the driver uses)
    environment:
      - NEO4J_AUTH=neo4j/scimesh123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: