n all 4 out of 6 evaluated domains.\u003cbr\u003e\u003cbr\u003eConfidence: 0.4"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:277", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:277", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eOn average, SkillOpt requires only 10 iterations to achieve stable training within the held-out gate.\u003cbr\u003e\u003cbr\u003eConfidence: 0.38"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:276", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:276", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eOur proposed text-space optimizer, SkillOpt, achieves a 3x increase in model transferability.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:275", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:275", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eSkillOpt reduces the cost of skill adaptation by 30% compared to one-shot skills.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:274", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:274", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe trajectory-derived edit direction proposed by SkillOpt is 15% more effective than baseline approaches.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:273", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:273", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eWe achieve a 5% improvement in validation performance over manually written skills.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:262", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat is the relationship between the number of chain-of-thought exemplars and the accuracy/solve rate of PaLM 540B on the GSM8K benchmark?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:263", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat determines whether large language models can benefit from chain-of-thought prompting, or do all sufficiently large models exhibit improved performance with chain-of-thought prompting?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:264", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat are the characteristics of tasks or datasets that distinguish when Chain-of-Thought prompting outperforms traditional prompting, or when Least-to-Most prompting is superior?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:265", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat is the relationship between the type of input datasets and the type of reasoning tasks that can be solved by different methods?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:266", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat is the optimal amount of self-generated data or self-training steps (iterations) required to achieve these improvements, and how does it trade off with the performance gain?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:267", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat is the reason behind the observed performance degradation when using the combination of datasets compared to training models on individual datasets?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:268", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eAre there any datasets or tasks where Faithful CoT performs worse than the baselines?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:269", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow does the choice of solver impact the performance and robustness of Faithful CoT across different tasks?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:270", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eCan least-to-most prompting be effectively generalized to real-world scenarios beyond the controlled environment of an existing benchmark or dataset?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:271", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow can models effectively utilize the probability P(IK) to improve the quality of answers they propose, particularly in scenarios where self-evaluation is required?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:289", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow do different types of tasks (e.g., arithmetic, QA, reasoning) influence the relative effectiveness of various prompting techniques, such as Chain-of-Thought and Least-to-Most?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:290", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat determines the optimal scale of language models needed for chain-of-thought prompting to be effective?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:291", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow do the gains in training speed and reductions in epoch numbers affect the real-world deployment time and costs of using the proposed methods?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:292", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eWhat is the relationship between the scale of an LLM\u0027s parameter size and the time required to complete a prompt-based inference task for a single arithmetic reasoning task, and how does this impact the practicality of applying LLMs in real-world applications?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:293", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow does the model interpretability-tradeoff affect calibration, and vice versa, when model size is increased?"}, {"color": "#9B59B6", "font": {"color": "white"}, "id": "gap_4:17c98ca7-7e93-4774-b196-eeeb427c5537:294", "label": "GAP", "shape": "diamond", "size": 20, "title": "\u003cb\u003eResearch Gap\u003c/b\u003e\u003cbr\u003eHow do the performance advantages of large-scale models on question answering tasks depend on
