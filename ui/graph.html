olve rate than PaLM 540B with standard prompting on the GSM8K benchmark of math word problems.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:24", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:24", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eLaMDA 137B achieves higher performance on arithmetic reasoning tasks when using prompting-based inference on TPU v3 with an 8x8 configuration and 64 chips.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:25", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:25", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003ePaLM 540B outperforms LaMDA 137B on commonsense reasoning tasks when using TPU v4 with a 4x4x12 configuration and 192 chips.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:26", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:26", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eGPT-3 API achieves lower performance on symbolic reasoning datasets compared to LaMDA 137B and PaLM 540B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:27", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:27", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe publicly available GPT-3 API with text-davinci-002 model scale performs better than text-ada-001 on arithmetic reasoning tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:28", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:28", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eLaMDA 137B requires fewer computational resources than PaLM 540B to achieve similar performance on certain commonsense reasoning tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.5"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:29", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:29", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe synthetic symbolic reasoning datasets created in this paper are more challenging for GPT-3 API than the datasets from the BIG-bench collaboration.\u003cbr\u003e\u003cbr\u003eConfidence: 0.4"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:30", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:30", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003ePaLM 540B achieves higher accuracy on the Math Word Problem Repository dataset than LaMDA 137B using prompting-based inference.\u003cbr\u003e\u003cbr\u003eConfidence: 0.85"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:31", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:31", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe use of TPU v4 with a 4x4x12 configuration and 192 chips for PaLM 540B results in faster inference times compared to using TPU v3 with an 8x8 configuration and 64 chips for LaMDA 137B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.95"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:32", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:32", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eChain-of-thought prompting allows sufficiently large language models to perform reasoning tasks that otherwise have flat scaling curves.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:33", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:33", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThrough experiments on arithmetic, symbolic, and commonsense reasoning, chain-of-thought reasoning is an emergent property of model scale.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:34", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:34", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003ePrompting a PaLM 540B with just eight chain-of-thought exemplars achieves state-of-the-art accuracy on the GSM8K benchmark of math word problems.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:35", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:35", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eChain-of-thought prompting outperforms finetuned GPT-3 with a verifier on the GSM8K benchmark of math word problems.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:36", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:36", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe average performance improvement of chain-of-thought prompting across three large language models is significant.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:37", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:37", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003ePrompting a PaLM 540B with chain-of-thought exemplars improves performance compared to standard prompting on arithmetic, commonsense, and symbolic reasoning tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:38", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:38", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eProviding just a few chain-of-thought demonstrations as exemplars in prompting significantly improves the ability of large language models to perform complex reasoning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:39", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:39", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003ePaLM 540B: standard prompting achieves worse performance on GSM8K than prior best.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:40", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:40", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003ePaLM 540B: chain-of-thought prompting achieves new state-of-the-art performance on GSM8K.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:41", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:41", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eFinetuned GPT-3 performs worse on GSM8K than PaLM 540B: chain-of-thought prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:42", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:42", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003ethe GSM8K benchmark of math word problems is not improved substantially by increasing language model scale when using traditional few-shot prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:43", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:43", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003echain-of-thought prompting improves performance over traditional few-shot prompting on tasks that require reasoning abilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:44", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:44", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003ecreating a large set of high-quality rationales for rationale-augmented training is more complicated than creating simple input\u2013output pairs.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:45", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:45", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003etraditional few-shot prompting does not improve substantially with increasing language model scale on tasks that require reasoning abilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:46", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:46", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003elanguage models can perform few-shot prompting on reasoning tasks with a prompt consisting of triples: \u27e8input, chain of thought, output\u27e9.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:47", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:47", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eUsing TPU v4 with 4x4x12 configuration (192 chips / 384 cores), PaLM 540B\u0027s prompting-based inference achieves accuracy of 82.1% on the arithmetic reasoning benchmark, outperforming LaMDA 137B\u0027s accuracy of 79.5% on the same benchmark.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:48", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:48", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe LaMDA 137B model, running on TPU v3 with 8x8 configuration (64 chips / 128 cores), requires 3.2 seconds to complete a prompt-based inference for a single arithmetic reasoning task, as measured in the experiments conducted for this paper.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:49", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:49", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe PaLM 540B model, using the publicly available GPT-3 API, demonstrates a 24.6% increase in commonsense reasoning accuracy compared to the GPT-3 text-curie-001 model on the StrategyQA benchmark, with an accuracy of 87.4% versus 70.8%, respectively.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:50", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:50", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe prompting-based inference using LaMDA 137B on the commonsense reasoning tasks requires an average of 1.5 seconds less than prompting-based inference on PaLM 540B, with LaMDA 137B taking only 3.5 seconds to complete the same task set.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:51", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:51", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe LaMDA 137B model achieves a 92.1% accuracy on the arithmetic Word Problem Repository benchmark, outperforming the AddSub benchmark accuracy of 90.5%, as reported in the experiments presented in this paper.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:52", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:52", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe PaLM 540B model, using the TPU v4 hardware configuration, requires a 2.1-fold increase in computational resources compared to LaMDA 137B, with PaLM 540B requiring 256 GB of memory versus LaMDA 137B\u0027s 124 GB, as reported in the computational resources section of the paper.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:53", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:53", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe LaMDA 137B model requires 21.6% more training data to achieve equal accuracy on the arithmetic multi-arithmetic benchmark compared to the PaLM 540B model, as reported in the dataset details section of the paper.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:54", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:54", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe LaMDA 137B model exhibits a 34.2% relative increase in commonsense reasoning accuracy on the Date understanding and sports understanding tasks from BIG-Bench compared to the strategyQA accuracy of 78.6%, with LaMDA 137B achieving an accuracy of 104.9% on these tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:55", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:55", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eChain-of-thought prompting enhances reasoning in language models, and increasing model scale leads to better performance on tasks with flat scaling curves.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:56", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:56", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eModel sizes over 1.3 billion parameters exhibit emergent property of chain-of-thought reasoning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:57", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:57", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe large language model Fine-Tuned on a dataset of 3 billion parameters demonstrates a 10% increase in reasoning ability compared to a baseline model.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:72", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:72", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe carbon footprint of developing OPT-175B is 1/7th that of GPT-3.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:71", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:71", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eOpen Pre-trained Transformers (OPT) is released to researchers, including decoder-only pre-trained transformers.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:70", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:70", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe OPT logbook detailing infrastructure challenges is released alongside the code.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:69", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:69", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe OPT model weights are fully shared with interested researchers.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:68", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:68", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eOPT is a suite of decoder-only pre-trained transformers.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:1 ults in a 5% improvement in perplexity on the validation set.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:109", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:109", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003ewe achieve a self-improvement rate of 24.5% on the language modeling benchmark, C4, after training for 100 epochs.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:108", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:108", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eTraining an LLM on its own generated labels results in improved accuracy scores compared to the original model performance.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:107", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:107", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe accuracy of the LLM on the six datasets improves when training on its own generated labels compared to not using generated labels.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:106", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:106", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eCombing large-scale generated data from our approach and existing supervised data can further improve the performance of LLMs.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:105", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:105", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eTraining an LLM on its own generated labels using an input question results in improved performance on reasoning datasets.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:104", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:104", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLarge Language Models can improve performance on reasoning datasets by training on their own generated labels given input questions only.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:103", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:103", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe LLM can self-improve even on its own generated questions and few-shot Chain-of-Thought prompts.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:102", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:102", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eOur approach achieves new state-of-the-art results on ARC, OpenBookQA, and ANLI without training on ground truth labels.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:101", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:101", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eTraining an LLM with 540 billion parameters on its own generated labels improves the accuracy scores on the six datasets by 1.1% to 7.7%.\u003cbr\u003e\u003cbr\u003eCo e": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe proposed scratchpad-based architecture achieves a 25% reduction in peak memory allocation on an 8-bit integer model.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:149", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:149", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur method accelerates inference by 1.4x on average compared to a baseline implementation without scratchpads.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:148", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:148", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eWe achieve a 2.1% reduction in computational overhead while reducing the model size by 30% by using scratchpad-based pruning.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:147", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:147", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eWe find that scratchpad-enabled models achieve an average performance speedup of at least 15% on algorithmic tasks compared to models without scratchpad capabilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:146", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:146", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eScratchpad capabilities enable models to solve 30% more polynomial evaluation tasks correctly compared to models without scratchpad capabilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:145", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:145", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eWe observed an average improvement of at least 10% in code execution times when using scratchpad-enabled models to evaluate code with nested conditional statements.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:144", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:144", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe single-line programs dataset used in our experiments demonstrates a positive correlation between model size and scratchpad utilization.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:143", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:143", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLong addition tasks solved with scratchpad-enabled models require at most 20 fewer iterations than those solved without scratchpad capabilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:142", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:142", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe scratchpad technique presented in this work reduces the average execution time of Python code by at least 10% compared to executing code without the scratchpad.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:141", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:141", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eOur experiments demonstrate that models with scratchpad capabilities achieve higher accuracy on polynomial evaluation tasks compared to models without scratchpad capabilities.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:140", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:140", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eAllowing models to read from and write to a simple scratchpad improves their performance on algorithmic tasks by at least 5%.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:139", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:139", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eTraining on either the single-line dataset or CodeNet dataset alone results in a gain in performance over training on the combination of datasets.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:138", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:138", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe combination of CodeNet and single-line datasets outperforms the single-line dataset alone by at least 3.2% task execution accuracy.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:137", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:137", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe MBPP-aug model executes tasks correctly at a lower rate than training models on single-line dataset or CodeNet dataset alone.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:136", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:136", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eGreedily decoding from the best model results in an exact correct trace for approximately 42% of all traces.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:135", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:135", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eFor nearly a quarter (24.6%) of tasks, the neural network traces all three examples perfectly.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:134", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:134", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eCombining the CodeNet and single-line datasets leads to a 26.6% accuracy rate in tracing the correct final output for tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:133", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:133", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eTraining on the CodeNet dataset alone results in a 25.2% increase in tasks executed correctly compared to MBPP-aug.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:132", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:132", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eTraining on the single-line dataset alone results in a 23.4% increase in tasks executed correctly compared to MBPP-aug.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:131", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:131", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eA 3000-line Python program evaluated using our proposed network shows an average accuracy rate of 92% in predicting the semantics of the code, outperforming a standard recurrent neural network by 28%.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:130", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:130", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe execution accuracy of large language models on a set of 10 benchmark tasks decreases by 18% when increasing the input size from 100 characters to 500 characters.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:129", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:129", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eIn a comparison of model performance on the same task, we found that a larger Transformer model with 128 million parameters outperforms a smaller model with 16 million parameters, with an average accuracy difference of 12%.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:128", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:128", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eOur experiment on a 20-line Python function shows that neural networks struggle to accurately represent the semantics of the code, resulting in an average error rate of 40%.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:127", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:127", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eStandard graph neural networks fail to systematically generalize on simple programs with loops, resulting in an error rate of 70% or higher.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:126", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:126", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe Transformer architecture applied to algorithmic reasoning tasks leads to an average decrease in execution accuracy of 25% compared to a standard recurrent neural network.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:125", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:125", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLarge-scale language models fail to accurately predict the result of executing Python code with an accuracy rate of 30% or lower on average across 10 benchmark tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:124", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:124", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eWe found that GPT-3 struggles to perform few-shot addition on numbers with greater than three digits in less than 90% of trials.\u003cbr\u003e\u003cbr\u003eConfidence: 0.4"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:123", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:123", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eWe demonstrate the ability of our models to perform multi-step computations on increasingly complex tasks, including program execution.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:122", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:122", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eOur results show that the scratchpad approach is effective even when given only 5 examples, a few-shot regime.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:121", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:121", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe time taken to perform multi-step computations decreases by 30% or more when using the scratchpad approach.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:120", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:120", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe scratchpad approach improves the accuracy of our models by at least 25% compared to standard transformer models.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:119", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:119", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eOur models are able to correctly execute arbitrary programs with a success rate of 85% or higher.\u003cbr\u003e\u003cbr\u003eConfidence: 0.85"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:118", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:118", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eUsing the scratchpad approach, we achieve an accuracy of 92% on the long addition task.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:117", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:117", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eWe train Transformers models with a maximum of 1 billion parameters to perform multi-step computations using scratchpads.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:194", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:194", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eUsing our method, we observe an average latency reduction of 35.7% with a 95% confidence interval on 3.4K queries in the real-world application.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:193", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:193", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur approach achieves an F1 score of 93.4% on the Few-Shot Question Answering task when training on 1.2K examples.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:192", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:192", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe chain-of-thought mechanism employed in our method enables an improvement of 13.2% in ROUGE score on the CNN/Daily Mail dataset.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:191", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:191", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur proposed method increases the precision by 11.9% on 80% of the questions in the TriviaQA dataset.\u003cbr\u003e\u003cbr\u003eConfidence: 0.5"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:190", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:190", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eBy employing a chain-of-thought reasoning mechanism, our model achieves an average reduction of 15.6% in mean squared error on the MATH dataset.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:189", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:189", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe proposed method reduces the inference time by 22.1% while maintaining the same level of accuracy on the SQuAD v2.0 dataset.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:188", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:188", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eBy incorporating 7 additional reasoning steps, our model increases its F1 score by 18.2% on the MultiNLI benchmark.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:187", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:187", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur method outperforms the baseline by achieving an average accuracy improvement of 12.5% on the 20-relation question answering task.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:186", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:186", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eFaithful CoT achieves new state-of-the-art performance on specific complex reasoning problems.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:185", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:185", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eFaithful CoT is evaluated on 10 datasets.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:184", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:184", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThere are frequent error patterns where Faithful CoT still struggles.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:183", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:183", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe solver plays a pivotal role in the Faithful CoT framework.\u003cbr\u003e\u0 oding is large enough to be significant.\u003cbr\u003e\u003cbr\u003eConfidence: 0.5"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:172", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:172", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eFaithful CoT with code-davinci-002 as the Translator converges to standard prompting with greedy decoding when using large enough sample outputs.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:171", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:171", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eFaithful CoT with code-davinci-002 as the Translator outperforms all baselines across all datasets.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:170", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:170", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eFaithful CoT addresses the concern of unfaithful explanations in high-stake applications.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:169", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:169", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eWhen unfaithful explanations look plausible to humans, it is easier for people to trust the model despite its implicit biases.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:168", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:168", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eFaithful CoT is more interpretable than standard CoT, as it provides a deterministic window into the model\u0027s reasoning process.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:167", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:167", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eUnfaithful CoT explanations can make people, including legal practitioners, over-trust the model, even if it has implicit biases.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:166", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:166", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eIn standard CoT, faithfulness is not guaranteed and can be systematically violated.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:165", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:165", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eFaithful CoT prevents unfaithful explanations where the answer does not follow from the reasoning chain.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:164", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:164", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eStandard CoT can generate unfaithful explanations, including cases where the answer is not mentioned in the reasoning chain.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:163", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:163", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eFaithful CoT, a reasoning framework, provides more accurate explanations than standard CoT, with a deterministic link between reasonings and answers.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:162", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:162", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eOn 6 out of 7 datasets, Faithful CoT achieves 95.0+ accuracy when using GPT-4 and Codex.\u003cbr\u003e\u003cbr\u003eConfidence: 0.97"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:161", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:161", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eUsing GPT-4 and Codex, Faithful CoT sets the new state-of-the-art few-shot performance on 7 datasets.\u003cbr\u003e\u003cbr\u003eConfidence: 0.96"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:160", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:160", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eFaithful CoT achieves a relative accuracy gain of 21.4% on Relational Inference.\u003cbr\u003e\u003cbr\u003eConfidence: 0.94"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:159", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:159", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eFaithful CoT achieves a relative accuracy gain of 5.5% on Multi-hop Question Answering (QA).\u003cbr\u003e\u003cbr\u003eConfidence: 0.92"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:158", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:158", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eFaithful CoT achieves a relative accuracy gain of 3.4% on Planning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:157", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:157", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eFaithful CoT achieves a relative accuracy gain of 6.3% on Math Word Problems (MWP).\u003cbr\u003e\u003cbr\u003eConfidence: 0.95"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:156", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:156", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eFaithful CoT outperforms standard CoT on 9 of 10 benchmarks from 4 diverse domains.\u003cbr\u003e\u003cbr\u003eConfidence: 0.98"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:229", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:229", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003ewe demonstrate that least-to-most prompting requires at least 2.5x fewer queries to achieve the same level of accuracy on the Natural Questions (NQ) benchmark.\u003cbr\u003e\u003cbr\u003eConfidence: 0.95"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:228", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:228", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003ein our ablation studies, we found that using a more gradual prompt scheduling mechanism contributes to a 6.8% improvement in F1-score on the CoQA conversational question answering dataset.\u003cbr\u003e\u003cbr\u003eConfidence: 0.92"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:227", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:227", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eour large model with 10 billion parameters outperforms the best published result on the RACE-M scenario-based question answering task by 3.9% absolute.\u003cbr\u003e\u003cbr\u003eConfidence: 0.85"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:226", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:226", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eon the SuperGLUE benchmark, least-to-most prompting improves the Average Precision (AP) score by 8.4% relative to the random-order baseline.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:225", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:225", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eby using least-to-most prompting, we achieve a 22.1% absolute improvement in Winograd Schema Challenge (WSC) accuracy compared to a random-order prompting baseline.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:224", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:224", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting enables immediate feedback to language models, facilitating more efficient and effective learning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:223", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:223", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe technique of least-to-most prompting can be viewed as a first step towards evolving prompting into fully bidirectional conversations.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:222", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:222", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting is more effective and efficient than standard prompting in facilitating language model learning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:221", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:221", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting entails a two-fold process consisting of top-down decomposition of the problem and bottom-up resolution generation.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:220", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:220", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003ePrompting might not be the optimal method for teaching reasoning skills to large language models.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:219", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:219", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting is a stride towards instructing language models through bidirectional interactions.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:218", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:218", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eThe least-to-most prompting technique enables language models to solve problems that are harder than those in the prompt.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:217", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:217", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Conclusion]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting significantly surpasses standard prompting and chain-of-thought prompting in terms of symbolic manipulation, compositional generalization, and mathematical reasoning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:216", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:216", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe Football task with 500 cases results in lower accuracy compared to the Non-football task across all tested prompting methods.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:215", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:215", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe language model with 540 billion parameters (LM-540B) achieves an accuracy of 74.20% on the Non-football task using the Least-to-Most prompting method.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:214", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:214", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe accuracy of the Least-to-Most prompting method is higher than the Chain-of-Thought method by 13.40% on the Non-football task with 500 cases.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:213", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:213", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe Least-to-Most prompting method has the highest accuracy of 74.20% on the Non-football task among all methods tested.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:212", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:212", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe text-davinci-002 model performs better than zero-shot prompting in the Non-football task, with a 33.80% accuracy difference.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:211", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:211", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eUsing the text-davinci-002 model, the Chain-of-Thought prompting method achieves an accuracy of 60.80% on the Non-football task with 500 cases.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:210", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:210", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe decomposition stage of least-to-most prompting is implemented using few-shot prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:209", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:209", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting improves interpretability of language models compared to chain-of-thought prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:208", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:208", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe number of annotated examples required to train least-to-most prompting models is significantly reduced compared to other models.\u003cbr\u003e\u003cbr\u003eConfidence: 0.5"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:207", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:207", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting is able to solve math reasoning tasks better than chain-of-thought prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:206", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:206", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe least-to-most prompting approach achieves improved performance on symbolic manipulation tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:205", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:205", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eEmpirical results show that least-to-most prompting can generalize to problems harder than those demonstrated.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:204", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:204", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eThe proposed least-to-most prompting approach requires no additional training or finetuning.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:203", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:203", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting outperforms chain-of-thought prompting on tasks requiring compositional generalization.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:202", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:202", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eGPT-3 code-davinci-002 model with least-to-most prompting can solve length split tasks of SCAN.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:201", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:201", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting is effective on compositional generalization tasks such as SCAN.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:200", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:200", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eChain-of-thought prompting struggles with problems harder than those exemplified in the prompts on symbolic manipulation tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:199", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:199", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting generalizes to more difficult problems than those seen in the prompts on symbolic manipulation tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:198", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:198", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting outperforms chain-of-thought prompting on tasks requiring symbolic manipulation.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:197", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:197", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eNeural-symbolic models specializing in SCAN require over 15,000 examples to reach their optimal performance.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:196", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:196", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eChain-of-thought prompting achieves only 16% accuracy on the SCAN benchmark with 14 exemplars.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:195", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:195", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eLeast-to-most prompting achieves at least 99% accuracy on the SCAN benchmark with 14 exemplars.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:261", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:261", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eWe reduce the computational cost of the model by 31.4% using our proposed optimization technique.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:260", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:260", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe average F1-score of our model is 0.72 in the \u0027History\u0027 domain.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:259", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:259", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eWe observe a 2.5:1 ratio of model successes to failures across all 12 questions in the quiz.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:258", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:258", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur model outperforms the baseline by 12.5% on the \u0027Science\u0027 domain using F1-score as the metric.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:257", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:257", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eWe find a significant correlation between model performance on our 12-question quiz and human evaluation scores (r = 0.87, p \u003c 0.001).\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:256", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:256", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eOur method reduces the number of model parameters by 21.1% compared to the baseline.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:255", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:255", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eThe model\u0027s knowledge coverage is 34.7% in the \u0027Animals\u0027 domain.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:254", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:254", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [preamble]\u003c/b\u003e\u003cbr\u003eWe demonstrate a 5-point improvement in human evaluators\u0027 ability to guess model knowledge using a 12-question multiple-choice quiz.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:253", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:253", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThere is some signal that starting from Model B does better than starting from Model A when training P(IK) using data from Model B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:252", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:252", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe AUROC score of the P(IK) classifier starting from Model B is higher than starting from Model A when testing on data from Model B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:251", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:251", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe Brier Score of the P(IK) classifier starting from Model A is lower than starting from Model B when testing on data from Model A.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:250", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:250", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe AUROC score of the P(IK) classifier starting from Model A is 0.8633 when testing on data from Model A.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:249", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:249", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe Brier Score of the P(IK) classifier starting from Model A is 0.1491 when testing on data from Model A.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:248", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:248", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThere is no significant difference between AUROC scores of the P(IK) classifier when starting from Model A or Model B when testing on data from Model A.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:247", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:247", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe Brier Score of the P(IK) classifier starting from Model B is 0.1497 when testing on data from Model B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:246", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:246", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Results]\u003c/b\u003e\u003cbr\u003eThe AUROC score of the P(IK) classifier starting from Model B is 0.8631 when testing on data from Model B.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:245", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:245", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eTraining models to predict whether or not they can correctly answer questions improves their ability to directly evaluate their own state of knowledge.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:244", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:244", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eModels improve at self-evaluation as model size and capabilities increase.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:243", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:243", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eProviding a model with many of its own samples improves self-evaluation.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:242", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:242", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eGood calibration enables models to evaluate the accuracy of their own outputs (self-evaluation).\u003cbr\u003e\u003cbr\u003eConfidence: 0.5"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:241", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:241", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eCalibration also improves with few-shot prompting.\u003cbr\u003e\u003cbr\u003eConfidence: 0.6"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:240", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:240", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eCalibration improves with model size.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:239", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:239", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLarge language models are also well-calibrated on a diverse array of multiple choice questions if questions are formatted appropriately.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:238", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:238", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Introduction]\u003c/b\u003e\u003cbr\u003eLanguage models can produce well-calibrated predictions for token probabilities on-distribution.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:237", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:237", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eModels struggle with calibration of P(IK) on new tasks, but not with prediction performance.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:236", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:236", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe predicted P(IK) probabilities increase appropriately in the presence of hints towards the solution of mathematical word problems.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:235", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:235", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eThe predicted P(IK) probabilities increase appropriately in the presence of relevant source materials in the context.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:234", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:234", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eModels that predict P(IK) partially generalize across tasks.\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:233", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:233", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eModels perform well at predicting P(IK), the probability that \u0027I know\u0027 the answer to a question, without reference to any particular proposed answer.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:232", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:232", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eP(True) performance at self-evaluation improves when models are allowed to consider many of their own samples before predicting the validity of one specific possibility.\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:231", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:231", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eWe can approach self-evaluation on open-ended sampling tasks by asking models to first propose answers, and then to evaluate the probability P(True) that their answers are correct.\u003cbr\u003e\u003cbr\u003eConfidence: 1.0"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:230", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:230", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Abstract]\u003c/b\u003e\u003cbr\u003eLarger models are well-calibrated on diverse multiple choice and true/false questions when provided in the right format.\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:288", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:288", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eSkillOpt outperforms TextGrad on ALFWorld by 7.5 points\u003cbr\u003e\u003cbr\u003eConfidence: 0.9"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:287", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:287", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eSkillOpt achieves lower hard score on OfficeQA (33.1) than LLM-skill (51.7) and Trace2Skill (65.7)\u003cbr\u003e\u003cbr\u003eConfidence: 0.8"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:286", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:286", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eSkillOpt outperforms Human-skill on Codex by 11.7 points\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:285", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:285", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eGPT-5.5 SkillOpt model performs better than GPT-5.4 SkillOpt model on all test splits\u003cbr\u003e\u003cbr\u003eConfidence: 0.7"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:284", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:284", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eSkillOpt achieves 91.2 hard score on DocVQA test splits\u003cbr\u003e\u003cbr\u003eConfidence: 0.98"}, {"color": "#7EC8A4", "font": {"color": "white"}, "id": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:283", "label": "claim_4:17c98ca7-7e93-4774-b196-eeeb427c5537:283", "shape": "dot", "size": 8, "title": "\u003cb\u003eClaim [Experiments]\u003c/b\u003e\u003cbr\u003eSkillOpt outperforms GEPA by 1.9 points on 80.
